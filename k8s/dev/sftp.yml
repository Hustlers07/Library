apiVersion: v1
kind: Namespace
metadata:
  name: library-dev

---
apiVersion: v1
kind: Secret
metadata:
  name: sftp-credentials
  namespace: library-dev
type: Opaque
stringData:
  sftp-username: "${SFTP_USERNAME}"
  sftp-password: "${SFTP_PASSWORD}"
  sftp-uid: "${SFTP_UID:-1001}"
  sftp-gid: "${SFTP_GID:-100}"
  sftp-directory: "/home/groot/Documents/rustfs/movies"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sftp-movies-pv-librarydev
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/groot/Documents/rustfs/movies
    type: DirectoryOrCreate
  volumeMode: Filesystem

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sftp-movies-pvc-librarydev
  namespace: library-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  volumeName: sftp-movies-pv-librarydev
  storageClassName: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sftp
  namespace: library-dev
  labels:
    app: sftp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sftp
  template:
    metadata:
      labels:
        app: sftp
    spec:
      securityContext:
        fsGroup: 100
      volumes:
        - name: sftp-data
          persistentVolumeClaim:
            claimName: sftp-movies-pvc-librarydev
      initContainers:
        - name: init-sftp-movies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/movies
              chmod 755 /data/movies
          volumeMounts:
            - name: sftp-data
              mountPath: /data
      containers:
        - name: sftp
          image: atmoz/sftp:latest
          imagePullPolicy: Always
          ports:
            - name: sftp
              containerPort: 22
          env:
            - name: SFTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sftp-credentials
                  key: sftp-username
            - name: SFTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sftp-credentials
                  key: sftp-password
            - name: SFTP_UID
              valueFrom:
                secretKeyRef:
                  name: sftp-credentials
                  key: sftp-uid
            - name: SFTP_GID
              valueFrom:
                secretKeyRef:
                  name: sftp-credentials
                  key: sftp-gid
            - name: SFTP_DIRECTORY
              valueFrom:
                secretKeyRef:
                  name: sftp-credentials
                  key: sftp-directory
          command:
            - /bin/sh
            - -c
            - |
              exec /entrypoint "$SFTP_USERNAME:$SFTP_PASSWORD:$SFTP_UID:$SFTP_GID:$SFTP_DIRECTORY"
          volumeMounts:
            - name: sftp-data
              mountPath: /home/groot/Documents/rustfs
              subPath: movies
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0

---
# Service: internal ClusterIP for SFTP
apiVersion: v1
kind: Service
metadata:
  name: sftp-service
  namespace: library-dev
  labels:
    app: sftp
spec:
  selector:
    app: sftp
  ports:
    - name: sftp
      port: 22
      targetPort: 22
  type: ClusterIP

---
# Service: optional NodePort for external access (choose a nodePort if required)
apiVersion: v1
kind: Service
metadata:
  name: sftp-nodeport
  namespace: library-dev
  labels:
    app: sftp
spec:
  selector:
    app: sftp
  ports:
    - name: sftp
      port: 22
      targetPort: 22
      nodePort: 30222
  type: NodePort

apiVersion: v1
kind: Namespace
metadata:
  name: library-dev
---
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: library-dev
type: Opaque
stringData:
  RUSTFS_ACCESS_KEY: "test"
  RUSTFS_SECRET_KEY: "test"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rustfs-public-pv
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/groot/Documents/rustfs/shared
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rustfs-public-pvc
  namespace: library-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  volumeName: rustfs-public-pv
  storageClassName: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: library-dev
  labels:
    app: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: library-dev
  template:
    metadata:
      labels:
        app: library-dev
    spec:
      nodeSelector:
        kubernetes.io/hostname: "groot-server"
      # Run entire pod as root to avoid any host path permission issues
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      initContainers:
      - name: init-chown-data
        image: busybox:1.36
        securityContext:
          runAsUser: 0                # Must be root to chown
        command:
        - sh
        - -c
        - |
          mkdir -p /data /logs
          chmod -R 777 /data /logs
          echo "Permissions set successfully"
        volumeMounts:
        - name: rustfs-data
          mountPath: /data
        - name: rustfs-logs
          mountPath: /logs
      containers:
      - name: rustfs
        image: rustfs/rustfs:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0               # Run RustFS as root
        ports:
        - name: s3
          containerPort: 9002
          hostPort: 9002
        - name: console
          containerPort: 9003
          hostPort: 9003
        env:
        - name: RUSTFS_CONSOLE_ENABLE
          value: "true"
        - name: RUSTFS_ADDRESS
          value: ":9002"
        - name: RUSTFS_CONSOLE_ADDRESS
          value: ":9003"
        - name: RUSTFS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: rustfs-credentials
              key: RUSTFS_ACCESS_KEY
        - name: RUSTFS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: rustfs-credentials
              key: RUSTFS_SECRET_KEY
        - name: RUSTFS_DRIVE_METADATA_TIMEOUT_SECS
          value: "15000"
        - name: RUSTFS_DRIVE_LIST_DIR_TIMEOUT_SECS
          value: "20000"
        - name: RUSTFS_DRIVE_WALKDIR_TIMEOUT_SECS
          value: "30000"
        volumeMounts:
        - name: rustfs-data
          mountPath: /data
        - name: rustfs-logs
          mountPath: /logs
        readinessProbe:
          httpGet:
            path: /health
            port: 9003
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 9003
          initialDelaySeconds: 20
          periodSeconds: 20
      volumes:
      - name: rustfs-data
        persistentVolumeClaim:
          claimName: rustfs-public-pvc
      - name: rustfs-logs
        hostPath:
          path: /home/groot/Documents/rustfs/shared/logs
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs-service
  namespace: library-dev
  labels:
    app: library-dev
spec:
  selector:
    app: library-dev
  ports:
  - name: s3
    port: 9002
    targetPort: 9002
  - name: console
    port: 9003
    targetPort: 9003
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management
  namespace: library-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-management
  template:
    metadata:
      labels:
        app: user-management
    spec:
      containers:
      - name: user-management
        image: hellisback/library-user-management:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: library-config
              key: SPRING_PROFILES_ACTIVE
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: library-config
              key: ALLOWED_ORIGINS
        - name: USER_SERVICE_SWAGGER_LOCAL_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: library-config
              key: USER_SERVICE_SWAGGER_LOCAL_SERVER_URL
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: library-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
          valueFrom:
            configMapKeyRef:
              name: library-config
              key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: library-secret
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: library-secret
              key: SPRING_DATASOURCE_PASSWORD
        livenessProbe:
          httpGet:
            path: /user-management/actuator/health
            port: 8080
          initialDelaySeconds: 70
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /user-management/actuator/health
            port: 8080
          initialDelaySeconds: 70
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: user-management-service
  namespace: library-dev
spec:
  selector: 
    app: user-management
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30003
  type: NodePort

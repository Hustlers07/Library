
# ─────────────────────────────────────────────
# Middleware: strip /phpmyadmin prefix
# ─────────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-phpmyadmin-prefix
  namespace: library-dev
spec:
  stripPrefix:
    prefixes:
      - /phpmyadmin
 
---
# ─────────────────────────────────────────────
# Ingress: user-management
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-management-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik            # FIX: added to all ingresses for consistency
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /user-management
            pathType: Prefix
            backend:
              service:
                name: user-management-service
                port:
                  number: 8080
 
---
# ─────────────────────────────────────────────
# Ingress: dashboard
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik            # FIX: added to all ingresses for consistency
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 80
 
---
# ─────────────────────────────────────────────
# Ingress: phpMyAdmin (strip-prefix middleware)
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpmyadmin-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: library-dev-strip-phpmyadmin-prefix@kubernetescrd
spec:
  ingressClassName: traefik            # FIX: added to all ingresses for consistency
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /phpmyadmin
            pathType: Prefix
            backend:
              service:
                name: phpmyadmin-service
                port:
                  number: 80
 
---
# ─────────────────────────────────────────────
# Ingress: RustFS console  (catch-all /)
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustfs-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustfs-service
                port:
                  name: console
 
---

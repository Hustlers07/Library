apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-phpmyadmin-prefix
  namespace: library-dev
spec:
  stripPrefix:
    prefixes:
      - /phpmyadmin
---
# Ingress for user-management (no middleware)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-management-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /user-management
            pathType: Prefix
            backend:
              service:
                name: user-management-service
                port:
                  number: 8080
---
# Ingress for dashboard (no middleware)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 80
---
# Ingress for phpMyAdmin (strip-prefix middleware applied here only)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phpmyadmin-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: library-dev-strip-phpmyadmin-prefix@kubernetescrd
spec:
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /phpmyadmin
            pathType: Prefix
            backend:
              service:
                name: phpmyadmin-service
                port:
                  number: 80


# Traefik timeout middleware for RustFS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rustfs-timeouts
  namespace: library-dev
spec:
  forwardingTimeouts:
    dialTimeout: 10s
    idleTimeout: 60s
    responseHeaderTimeout: 30s
    readTimeout: 30s
    writeTimeout: 30s
---
# Ingress for rustfs with timeout middleware
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustfs-ingress
  namespace: library-dev
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: library-dev-rustfs-timeouts@kubernetescrd
spec:
  rules:
    - host: cotton-overripe-skyrocket.ngrok-free.dev
      http:
        paths:
          - path: /rustfs
            pathType: Prefix
            backend:
              service:
                name: rustfs-service
                port:
                  number: 9003
---
# ─────────────────────────────────────────────
# Secret: RustFS credentials
# ─────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: library-dev
type: Opaque
stringData:
  RUSTFS_ACCESS_KEY: "${RUSTFS_ACCESS_KEY}"
  RUSTFS_SECRET_KEY: "${RUSTFS_SECRET_KEY}"
 
---
# ─────────────────────────────────────────────
# PersistentVolume: RustFS shared storage
# ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rustfs-shared-pv-librarydev
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /home/groot/Documents/rustfs/shared
    type: DirectoryOrCreate
  volumeMode: Filesystem
 
---
# ─────────────────────────────────────────────
# PersistentVolumeClaim: RustFS shared storage
# ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rustfs-shared-pvc-librarydev
  namespace: library-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
  volumeName: rustfs-shared-pv-librarydev
  storageClassName: ""
 
---
# ─────────────────────────────────────────────
# Deployment: RustFS
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: library-dev
  labels:
    app: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      nodeSelector:
        kubernetes.io/hostname: "groot-server"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      initContainers:
        - name: init-chown-data
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /data /logs
              chmod -R 777 /data /logs
              echo "Permissions set successfully"
          volumeMounts:
            - name: rustfs-data
              mountPath: /data
            - name: rustfs-logs
              mountPath: /logs
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          imagePullPolicy: Always        # FIX: was IfNotPresent; Always ensures latest tag is fresh
          securityContext:
            runAsUser: 0
          ports:
            - name: s3
              containerPort: 9002
            - name: console
              containerPort: 80
          env:
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
            - name: RUSTFS_ADDRESS
              value: ":9002"
            - name: RUSTFS_CONSOLE_ADDRESS
              value: ":80"
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_ACCESS_KEY
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rustfs-credentials
                  key: RUSTFS_SECRET_KEY
          volumeMounts:
            - name: rustfs-data
              mountPath: /data
            - name: rustfs-logs
              mountPath: /logs
          # FIX: tcpSocket on S3 port — console returns 403 on all HTTP paths (auth required)
          readinessProbe:
            tcpSocket:
              port: 9002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 9002
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: rustfs-data
          persistentVolumeClaim:
            claimName: rustfs-shared-pvc-librarydev
        - name: rustfs-logs
          hostPath:
            path: /home/groot/Documents/rustfs/shared/logs
            type: DirectoryOrCreate
 
---
# ─────────────────────────────────────────────
# Service: RustFS
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: rustfs-service
  namespace: library-dev
  labels:
    app: rustfs
spec:
  selector:
    app: rustfs
  ports:
    - name: s3
      port: 9002
      targetPort: 9002
    - name: console
      port: 80
      targetPort: 80
  type: LoadBalancer
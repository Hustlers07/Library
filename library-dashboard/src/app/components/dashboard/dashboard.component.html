<div class="grid-container">
  <h1 class="mat-h1">Dashboard</h1>
  <mat-grid-list cols="2" rowHeight="350px">
    @for (card of cards | async; track card) {
    <mat-grid-tile [colspan]="card.cols" [rowspan]="card.rows">
      <mat-card class="dashboard-card">
        <mat-card-header>
          <mat-card-title>
            {{ card.title }}
            <button matIconButton class="more-button" [matMenuTriggerFor]="menu" aria-label="Toggle menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu" xPosition="before">
              <button mat-menu-item>Expand</button>
              <button mat-menu-item>Remove</button>
            </mat-menu>
          </mat-card-title>
        </mat-card-header>
        <mat-card-content class="dashboard-card-content">
          @switch (card.title) {

          @case ('Seats') {
          <app-seats-view></app-seats-view>
          }

          @case ('Members') {
          <app-members-view></app-members-view>
          }

          @case ('Payments') {
          <app-payments-view></app-payments-view>
          }

          @case ('Rooms') {
          <app-rooms-view></app-rooms-view>
          }

          @default{
          <p>Content for {{ card.title }}</p>
          }
          }
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>
    }
  </mat-grid-list>
</div>

<div class="form-wrapper">
    <mat-card class="form-card">
        <mat-card-header>
            <mat-card-title>Room Details</mat-card-title>

        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="createForm", class="create-form" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline">
                    <mat-label>House No.</mat-label>
                    <input matInput formControlName="houseNo">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Floor</mat-label>
                    <input matInput formControlName="floor">
                </mat-form-field >
                <mat-form-field appearance="outline">
                    <mat-label>Location</mat-label>
                    <input matInput formControlName="location">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Description</mat-label>
                    <input matInput formControlName="description">
                </mat-form-field>
               <button mat-raised-button color="primary" type="submit" [disabled]="createForm.invalid">Submit</button>

            </form>
        </mat-card-content>
        
    </mat-card>
</div>

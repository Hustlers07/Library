<div class="seat-form-wrapper">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Map provider to seat</mat-card-title>
      <mat-card-subtitle>Use the seat ID and provider username from the API</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="mapForm" (ngSubmit)="onMapUser()">
        <mat-form-field appearance="outline" style="width: 100%; margin-top: 20px;">
          <mat-label>Seat ID</mat-label>
          <input matInput type="number" formControlName="seatId" min="1" />
        </mat-form-field>

        <mat-form-field appearance="outline" style="width: 100%;">
          <mat-label>Provider username</mat-label>
          <input matInput formControlName="username" placeholder="test" />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="mapForm.invalid">Map Provider</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>

<div class="login-wrapper">
    <mat-card class="login-card" appearance="outlined">
        <mat-card-header>
            <mat-card-title>Password</mat-card-title>


        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="passwordUpdateForm" class="login-form" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline">

                    <mat-label>Username</mat-label>
                    <input matInput formControlName="username" type="text" required>
                    <mat-error>

                        @if(passwordUpdateForm.get('username')?.hasError('required')){

                            Username is required
                        }

                    </mat-error>

                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="newPassword" [type]="hidePassword ? 'password' : 'text'" required>
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                        [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error>
                        @if(passwordUpdateForm.get('newPassword')?.hasError('required')){
                        Password is required
                        }

                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" [disabled]="passwordUpdateForm.invalid">Update</button>

                <mat-error [style.color]="messageColor()" *ngIf="message().trim().length > 0">
                    {{ message() }}
                </mat-error>
            </form>
        </mat-card-content>
       
    </mat-card>
</div>

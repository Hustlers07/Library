@if(loading()) {
<div class="spinner-overlay">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
</div>
}

@if (enableNav()) {

<mat-toolbar class="mat-elevation-z3">
    <button matIconButton class="example-icon" (click)="toggleSideNav.set(!toggleSideNav())"
        aria-label="Example icon-button with menu icon">
        <mat-icon>menu</mat-icon>
    </button>
 
    <span>Library</span>
    <span class="spacer"></span>
    
    <button matIconButton class="example-icon" aria-label="Example icon-button with share icon">
        <mat-icon>logout</mat-icon>
    </button>

</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
    <mat-sidenav mode="side" [opened]="toggleSideNav()" class="sidenav">
        <app-custom-sidenav></app-custom-sidenav>
    </mat-sidenav>
    <mat-sidenav-content class="container">
        <router-outlet />
    </mat-sidenav-content>
</mat-sidenav-container>
}

@else {
<router-outlet />
}

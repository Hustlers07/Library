name: Build and Publish Numeric Versioned Docker Images

on:
  push:
    branches: [develop]
  pull_request:

jobs:
  filter-changed:
    runs-on: ubuntu-latest
    outputs:
      user-management: ${{ steps.filter.outputs.user-management }}
      booking-management: ${{ steps.filter.outputs.booking-management }}
      payment-plus-notification: ${{ steps.filter.outputs.payment-plus-notification }}
      library-dashboard: ${{ steps.filter.outputs.library-dashboard }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter package changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            user-management:
              - 'user-management/**'
            library-dashboard:
              - 'library-dashboard/**'

  # ---------------- User Management ----------------
  build-push-user-management:
    if: needs.filter-changed.outputs.user-management == 'true'
    runs-on: ubuntu-latest
    needs: filter-changed
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build JAR with Maven
        run: mvn -f user-management/pom.xml clean package
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./user-management
          file: ./user-management/Dockerfile
          push: true
          tags: |
            hellisback/library-user-management:v${{ github.run_number }}
            hellisback/library-user-management:latest

  # ---------------- Library Dashboard ----------------
  build-push-library-dashboard:
    if: needs.filter-changed.outputs.library-dashboard == 'true'
    runs-on: ubuntu-latest
    needs: filter-changed
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./library-dashboard
      - name: Build Angular application
        run: npm run build -- --configuration production
        working-directory: ./library-dashboard
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./library-dashboard
          file: ./library-dashboard/Dockerfile
          push: true
          tags: |
            hellisback/library-dashboard:v${{ github.run_number }}
            hellisback/library-dashboard:latest

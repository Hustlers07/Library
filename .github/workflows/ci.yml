name: Build and Publish Numeric Versioned Docker Images

on:
  push:
    branches: [develop]
  pull_request:

jobs:
  filter-changed:
    runs-on: ubuntu-latest
    outputs:
      user-management: ${{ steps.filter.outputs.user-management }}
      booking-management: ${{ steps.filter.outputs.booking-management }}
      payment-plus-notification: ${{ steps.filter.outputs.payment-plus-notification }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter package changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            user-management:
              - 'user-management/**'
            booking-management:
              - 'booking-management/**'
            payment-plus-notification:
              - 'payment-plus-notification/**'

  # ---------------- User Management ----------------
  build-push-user-management:
    if: needs.filter-changed.outputs.user-management == 'true'
    runs-on: ubuntu-latest
    needs: filter-changed
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build JAR with Maven
        run: mvn -f user-management/pom.xml clean package
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./user-management
          file: ./user-management/Dockerfile
          push: true
          tags: |
            hellisback/library-user-management:v${{ github.run_number }}
            hellisback/library-user-management:latest

  # ---------------- Booking Management ----------------
  build-push-booking-management:
    if: needs.filter-changed.outputs.booking-management == 'true'
    runs-on: ubuntu-latest
    needs: filter-changed
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build JAR with Maven
        run: mvn -f booking-management/pom.xml clean package
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./booking-management
          file: ./booking-management/Dockerfile
          push: true
          tags: |
            hellisback/library-booking-management:v${{ github.run_number }}
            hellisback/library-booking-management:latest

  # ---------------- Payment Plus Notification ----------------
  build-push-payment-plus-notification:
    if: needs.filter-changed.outputs.payment-plus-notification == 'true'
    runs-on: ubuntu-latest
    needs: filter-changed
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build JAR with Maven
        run: mvn -f payment-plus-notification/pom.xml clean package
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./payment-plus-notification
          file: ./payment-plus-notification/Dockerfile
          push: true
          tags: |
            hellisback/library-payment-plus-notification:v${{ github.run_number }}
            hellisback/library-payment-plus-notification:latest

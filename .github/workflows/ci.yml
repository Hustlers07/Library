name: Build and Publish Versioned Docker Images

on:
  push:
    branches: [develop]
  pull_request:
    # branches: [main]

jobs:
  filter-changed:
    runs-on: ubuntu-latest
    outputs:
      subpackageA: ${{ steps.filter.outputs.subpackageA }}
      # subpackageB: ${{ steps.filter.outputs.subpackageB }}
    steps:
      - uses: actions/checkout@v4

      - name: Filter subpackage changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            subpackageA:
              - 'user-management/**'
            # subpackageB:
            #   - 'packages/subpackage-B/**'

  get-version-subpackage-A:
    if: needs.filter-changed.outputs.subpackageA == 'true'
    runs-on: ubuntu-latest
    needs: filter-changed
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version for subpackage A
        id: version
        uses: reecetech/version-increment@2024.10.1
        with:
          scheme: semver
          increment: patch
          tag_prefix: subpackage-a-

  build-push-subpackage-A:
    if: needs.filter-changed.outputs.subpackageA == 'true'
    runs-on: ubuntu-latest
    needs: get-version-subpackage-A
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: true

      - name: Build and push Docker image for Subpackage A
        uses: docker/build-push-action@v7
        with:
          context: ./packages/subpackage-A
          file: ./packages/subpackage-A/Dockerfile
          push: true
          tags: hellisback/library-user-management:${{ needs.get-version-subpackage-A.outputs.version }}

  # get-version-subpackage-B:
